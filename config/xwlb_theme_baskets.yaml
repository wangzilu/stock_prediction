# XWLB (新闻联播) theme → A-share stock basket map (starter set).
#
# cx C.P1 #3 (2026-06-07): scripts/extract_policy_events.py writes
# XWLB events keyed by ``THEME_<UPPER>``. Stock-level training samples
# never match that instrument code, so the broadcast helper in
# factors/xwlb_theme_baskets.py replicates each (date, THEME_X) factor
# row onto every (date, STOCK_K) row for STOCK_K in the theme's basket.
#
# Limitations (acknowledged):
#   - This is a STARTER set of a dozen high-confidence themes —
#     coverage is intentionally partial. Themes not listed here pass
#     through as no-op (their factor rows simply don't broadcast).
#   - Basket membership is a hand-curated heuristic, not an exhaustive
#     industry classification. Expansion is a separate PR (likely with
#     an automatic-mining step against industry classification +
#     concept tags).
#   - The mapping is STATIC. Companies that join / leave a theme do
#     not move on a single XWLB event. Mid-term refresh cadence is
#     OK (quarterly), real-time dynamic baskets are out of scope.
#
# Key: theme name as it appears in scripts/extract_policy_events.py
#      (Chinese characters, lowercase canonical form). The mapper
#      uppercases + ``THEME_`` prefixes internally to match the
#      parquet's instrument codes.
# Value: list of qlib instrument codes (UPPERCASE SH/SZ/BJ + 6-digit code).

